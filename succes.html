<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Succes - Flora Elegance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, 'Cormorant Garamond', serif;
            background-color: #8c6f79;
            color: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .page-wrapper {
            width: 100%;
            padding: 20px;
        }

        .card {
            max-width: 520px;
            margin: 0 auto;
            background-color: white;
            border-radius: 32px;
            padding: 48px 42px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.18);
            text-align: center;
        }

        .icon-circle {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            background-color: #e7c1bc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 34px;
        }

        .icon-circle::before {
            content: '✓';
            color: white;
            font-size: 42px;
            font-weight: 700;
        }

        .status-title {
            font-size: 26px;
            color: #2d2d2d;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .status-subtitle {
            font-size: 15px;
            color: #6d6d6d;
            line-height: 1.9;
            margin-bottom: 34px;
            letter-spacing: 0.2px;
        }

        .status-subtitle strong {
            color: #2d2d2d;
        }

        .home-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 180px;
            padding: 14px 0;
            border-radius: 14px;
            border: none;
            background-color: #d56d70;
            color: white;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 0.25s ease, transform 0.25s ease;
        }

        .home-button:hover {
            background-color: #bf5f63;
            transform: translateY(-2px);
        }

        @media (max-width: 640px) {
            body {
                padding: 14px;
            }

            .card {
                padding: 32px 24px;
                border-radius: 28px;
            }

            .icon-circle {
                width: 78px;
                height: 78px;
                margin-bottom: 28px;
            }

            .status-title {
                font-size: 22px;
                margin-bottom: 14px;
            }

            .status-subtitle {
                font-size: 14px;
                margin-bottom: 28px;
            }

            .home-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="success-header">
            <div class="logo-image">
                <img src="logo.svg" alt="Flora Elegance">
            </div>
        </header>
        <div class="card">
            <div class="icon-circle"></div>
            <div class="status-title">Mesaj trimis cu succes!</div>
            <div class="status-subtitle">I?i mul?umim pentru interes. Echipa noastra de floristi te va contacta in cel mai scurt timp posibil.</div>
            <a href="index.html" class="home-button">Inapoi la Acasa</a>
        </div>
    </div>
</body>
</html>
